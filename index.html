<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>C24 asset URL copy tool</title>
  <link rel="icon" type="image/png" href="./c24 blok logo.png" />
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffdf9;
      --panel-strong: #f7f1e8;
      --text: #1f2823;
      --muted: #5f6f66;
      --line: #d7ddd6;
      --primary: #2a2b61;
      --primary-hover: #1f204b;
      --primary-soft: #ececfa;
      --secondary: #e9dfd2;
      --secondary-hover: #ddd1c1;
      --accent: #c8752a;
      --shadow: rgba(43, 55, 48, 0.12);
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(42, 43, 97, 0.12), transparent 28%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 960px;
      margin: 30px auto;
      background: var(--panel);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(95, 111, 102, 0.12);
      box-shadow: 0 14px 40px var(--shadow);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #16201b;
    }

    .screen[hidden] {
      display: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    input {
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      background: #fffdfa;
      color: var(--text);
    }

    input:focus {
      outline: 2px solid rgba(42, 43, 97, 0.18);
      outline-offset: 1px;
      border-color: var(--primary);
    }

    button {
      margin-top: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .secondary-btn {
      background: var(--secondary);
      color: var(--text);
    }

    .secondary-btn:hover:not(:disabled) {
      background: var(--secondary-hover);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      padding: 12px;
      border-radius: 8px;
      background: var(--primary-soft);
      border: 1px solid rgba(42, 43, 97, 0.14);
      white-space: pre-wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
      border: 1px solid rgba(95, 111, 102, 0.1);
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(95, 111, 102, 0.12);
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: var(--panel-strong);
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .action-btn {
      margin-top: 0;
      padding: 8px 12px;
      font-size: 13px;
      background: #20332a;
    }

    .action-btn:hover:not(:disabled) {
      background: #16241d;
    }

    .url-preview {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid rgba(200, 117, 42, 0.2);
      border-radius: 8px;
      background: #fff6ec;
      word-break: break-all;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-row {
      margin-top: 16px;
    }

    .drop-zone {
      margin-top: 20px;
      padding: 28px;
      border: 2px dashed rgba(42, 43, 97, 0.35);
      border-radius: 12px;
      background: linear-gradient(180deg, #f7f7fd 0%, #f0f1fb 100%);
      text-align: center;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    .drop-zone.drag-over {
      border-color: var(--primary);
      background: #e4e5f8;
      transform: translateY(-1px);
    }

    .drop-zone-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .selected-file {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #fcfaf6;
      border: 1px solid rgba(95, 111, 102, 0.14);
      word-break: break-word;
    }

    .hidden-input {
      display: none;
    }

    .file-name {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .file-name img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex: 0 0 auto;
      border-radius: 6px;
      background: #fff;
      border: 1px solid rgba(95, 111, 102, 0.12);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="connectionScreen" class="screen">
      <h1>SFTP File Browser</h1>
      <p class="muted">Save the connection settings locally, enter the key passphrase each time, then open the file list in a separate screen.</p>

      <div class="grid">
        <div class="field">
          <label for="host">Host</label>
          <input id="host" placeholder="sftp.example.com" />
        </div>

        <div class="field">
          <label for="port">Port</label>
          <input id="port" placeholder="22" value="22" />
        </div>

        <div class="field">
          <label for="username">Username</label>
          <input id="username" placeholder="username" />
        </div>

        <div class="field">
          <label for="passphrase">Key Passphrase</label>
          <input id="passphrase" type="password" placeholder="enter each time" />
        </div>

        <div class="field full">
          <label for="privateKeyPath">Private Key Path</label>
          <input id="privateKeyPath" placeholder="C:\Users\Dennis\.ssh\id_rsa or /Users/dennis/.ssh/id_rsa" />
        </div>

        <div class="field full">
          <label for="remotePath">Remote Folder</label>
          <input id="remotePath" placeholder="/home/files/incoming" />
        </div>
      </div>

      <button id="connectBtn">Connect and Open File List</button>
      <div id="status" class="status">Ready.</div>
    </div>

    <div id="filesScreen" class="screen" hidden>
      <div class="toolbar">
        <div>
          <h1>Files</h1>
          <p id="connectionSummary" class="muted"></p>
        </div>
        <div class="toolbar-actions">
          <button id="openUploadScreenBtn" class="secondary-btn">Upload File</button>
          <button id="changeConnectionBtn" class="secondary-btn">Change Connection</button>
          <button id="refreshBtn">Refresh Files</button>
        </div>
      </div>

      <div id="filesStatus" class="status">Ready.</div>
      <div id="urlPreview" class="url-preview" style="display:none;"></div>
      <div class="field search-row">
        <label for="searchInput">Search Files</label>
        <input id="searchInput" placeholder="Type to filter by file name" />
      </div>

      <table id="resultsTable" style="display:none;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Size</th>
            <th>Modified</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div id="uploadScreen" class="screen" hidden>
      <div class="toolbar">
        <div>
          <h1>Upload File</h1>
          <p id="uploadConnectionSummary" class="muted"></p>
        </div>
        <div class="toolbar-actions">
          <button id="backToFilesBtn" class="secondary-btn">Back to Files</button>
          <button id="changeConnectionFromUploadBtn" class="secondary-btn">Change Connection</button>
        </div>
      </div>

      <div id="uploadStatus" class="status">Choose a file to upload.</div>
      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-title">Drop a file here</div>
        <div class="muted">or choose a file from this device</div>
        <button id="chooseFileBtn" type="button">Choose File</button>
        <input id="fileInput" class="hidden-input" type="file" />
      </div>
      <div id="selectedFileInfo" class="selected-file" style="display:none;"></div>
      <button id="uploadBtn" disabled>Upload Selected File</button>
    </div>
  </div>

  <script>
    const { ipcRenderer, clipboard, webUtils } = require('electron');
    const path = require('path');
    const STORAGE_KEY = 'sftp-file-browser-settings';
    const DEFAULT_SETTINGS = {
      host: 'assets.conversation24.com',
      port: '22',
      username: 'conversation24.com',
      privateKeyPath: '',
      remotePath: '/srv/www/c/conversation24.com/vhosts/assets/htdocs/wa_images'
    };

    const connectionScreen = document.getElementById('connectionScreen');
    const filesScreen = document.getElementById('filesScreen');
    const connectBtn = document.getElementById('connectBtn');
    const statusEl = document.getElementById('status');
    const filesStatusEl = document.getElementById('filesStatus');
    const urlPreviewEl = document.getElementById('urlPreview');
    const resultsTable = document.getElementById('resultsTable');
    const resultsBody = document.getElementById('resultsBody');
    const refreshBtn = document.getElementById('refreshBtn');
    const openUploadScreenBtn = document.getElementById('openUploadScreenBtn');
    const changeConnectionBtn = document.getElementById('changeConnectionBtn');
    const uploadScreen = document.getElementById('uploadScreen');
    const backToFilesBtn = document.getElementById('backToFilesBtn');
    const changeConnectionFromUploadBtn = document.getElementById('changeConnectionFromUploadBtn');
    const uploadConnectionSummaryEl = document.getElementById('uploadConnectionSummary');
    const uploadStatusEl = document.getElementById('uploadStatus');
    const dropZone = document.getElementById('dropZone');
    const chooseFileBtn = document.getElementById('chooseFileBtn');
    const fileInput = document.getElementById('fileInput');
    const selectedFileInfoEl = document.getElementById('selectedFileInfo');
    const uploadBtn = document.getElementById('uploadBtn');
    const connectionSummaryEl = document.getElementById('connectionSummary');
    const searchInput = document.getElementById('searchInput');

    let currentConfig = null;
    let currentFiles = [];
    let selectedUploadPath = '';

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function normalizeRemotePath(remotePath) {
      if (!remotePath) return '';
      return remotePath.replace(/\\/g, '/').replace(/\/+/g, '/').replace(/\/$/, '');
    }

    function getPublicAssetPath(remotePath) {
      const normalizedPath = normalizeRemotePath(remotePath);
      const publicRoot = '/wa_images';
      const publicRootIndex = normalizedPath.indexOf(publicRoot);

      if (publicRootIndex === -1) {
        return normalizedPath;
      }

      return normalizedPath.slice(publicRootIndex);
    }

    function createAssetUrl(remotePath, fileName) {
      const baseUrl = 'https://assets.conversation24.com';
      const publicPath = getPublicAssetPath(remotePath);
      const cleanFileName = String(fileName || '').replace(/^\/+/, '');
      return `${baseUrl}${publicPath}/${cleanFileName}`;
    }

    function copyUrl(remotePath, fileName) {
      const url = createAssetUrl(remotePath, fileName);
      clipboard.writeText(url);
      urlPreviewEl.style.display = '';
      urlPreviewEl.innerHTML = `<strong>Copied URL:</strong><br>${escapeHtml(url)}`;
      filesStatusEl.textContent = `Copied URL for ${fileName} to clipboard.`;
    }

    function setScreen(screenName) {
      connectionScreen.hidden = screenName !== 'connection';
      filesScreen.hidden = screenName !== 'files';
      uploadScreen.hidden = screenName !== 'upload';
    }

    function getConfigFromForm() {
      return {
        host: document.getElementById('host').value.trim(),
        port: document.getElementById('port').value.trim(),
        username: document.getElementById('username').value.trim(),
        passphrase: document.getElementById('passphrase').value,
        privateKeyPath: document.getElementById('privateKeyPath').value.trim(),
        remotePath: document.getElementById('remotePath').value.trim()
      };
    }

    function saveSettings(config) {
      const settingsToStore = {
        host: config.host,
        port: config.port,
        username: config.username,
        privateKeyPath: config.privateKeyPath,
        remotePath: config.remotePath
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settingsToStore));
    }

    function loadSavedSettings() {
      document.getElementById('host').value = DEFAULT_SETTINGS.host;
      document.getElementById('port').value = DEFAULT_SETTINGS.port;
      document.getElementById('username').value = DEFAULT_SETTINGS.username;
      document.getElementById('privateKeyPath').value = DEFAULT_SETTINGS.privateKeyPath;
      document.getElementById('remotePath').value = DEFAULT_SETTINGS.remotePath;

      try {
        const rawSettings = localStorage.getItem(STORAGE_KEY);
        if (!rawSettings) return;

        const settings = JSON.parse(rawSettings);
        document.getElementById('host').value = settings.host || DEFAULT_SETTINGS.host;
        document.getElementById('port').value = settings.port || DEFAULT_SETTINGS.port;
        document.getElementById('username').value = settings.username || DEFAULT_SETTINGS.username;
        document.getElementById('privateKeyPath').value = settings.privateKeyPath || DEFAULT_SETTINGS.privateKeyPath;
        document.getElementById('remotePath').value = settings.remotePath || DEFAULT_SETTINGS.remotePath;
      } catch (_error) {
        localStorage.removeItem(STORAGE_KEY);
      }

      document.getElementById('passphrase').value = '';
    }

    function updateConnectionSummary(config) {
      connectionSummaryEl.textContent = `${config.username}@${config.host}:${config.port || '22'}  ${config.remotePath}`;
      uploadConnectionSummaryEl.textContent = connectionSummaryEl.textContent;
    }

    function clearSelectedUpload() {
      selectedUploadPath = '';
      fileInput.value = '';
      selectedFileInfoEl.style.display = 'none';
      selectedFileInfoEl.textContent = '';
      uploadBtn.disabled = true;
    }

    function setSelectedUpload(filePath) {
      selectedUploadPath = filePath || '';

      if (!selectedUploadPath) {
        clearSelectedUpload();
        return;
      }

      selectedFileInfoEl.style.display = '';
      selectedFileInfoEl.innerHTML = `<strong>Selected file:</strong><br>${escapeHtml(selectedUploadPath)}`;
      uploadStatusEl.textContent = `Ready to upload ${path.basename(selectedUploadPath)}.`;
      uploadBtn.disabled = false;
    }

    function getLocalPathFromFile(file) {
      if (!file) return '';

      if (typeof file.path === 'string' && file.path) {
        return file.path;
      }

      if (webUtils && typeof webUtils.getPathForFile === 'function') {
        return webUtils.getPathForFile(file) || '';
      }

      return '';
    }

    function sortFilesNewestFirst(files) {
      return [...files].sort((a, b) => {
        const left = Number(a.modifyTime || 0);
        const right = Number(b.modifyTime || 0);
        return right - left;
      });
    }

    function isPreviewableFile(fileName) {
      return /\.(avif|gif|jpe?g|png|svg|webp)$/i.test(String(fileName || ''));
    }

    function renderFileThumbnail(remotePath, item) {
      const fallbackIcon = './c24 blok logo.png';

      if (!isPreviewableFile(item.name)) {
        return `<img src="${fallbackIcon}" alt="" aria-hidden="true" />`;
      }

      const assetUrl = escapeHtml(createAssetUrl(remotePath, item.name));
      const escapedFallbackIcon = escapeHtml(fallbackIcon);
      const escapedName = escapeHtml(item.name);

      return `<img src="${assetUrl}" alt="${escapedName}" loading="lazy" onerror="this.onerror=null;this.src='${escapedFallbackIcon}'" />`;
    }

    function renderFiles(files, remotePath) {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const visibleFiles = files.filter((item) => item.name.toLowerCase().includes(searchTerm));

      if (visibleFiles.length === 0) {
        resultsBody.innerHTML = '';
        resultsTable.style.display = 'none';
        filesStatusEl.textContent = searchTerm
          ? `No files match "${searchInput.value.trim()}".`
          : 'Connected. Found 0 file(s).';
        return;
      }

      resultsBody.innerHTML = visibleFiles.map(item => `
        <tr>
          <td>
            <span class="file-name">
              ${renderFileThumbnail(remotePath, item)}
              <span>${escapeHtml(item.name)}</span>
            </span>
          </td>
          <td>${escapeHtml(item.type)}</td>
          <td>${escapeHtml(item.size)}</td>
          <td>${escapeHtml(formatDate(item.modifyTime))}</td>
          <td><button class="action-btn" data-file-name="${escapeHtml(item.name)}">Copy URL</button></td>
        </tr>
      `).join('');
      resultsTable.style.display = '';

      resultsBody.querySelectorAll('.action-btn').forEach(button => {
        button.addEventListener('click', () => {
          const fileName = button.getAttribute('data-file-name');
          copyUrl(remotePath, fileName);
        });
      });
    }

    async function fetchFiles(config) {
      resultsTable.style.display = 'none';
      resultsBody.innerHTML = '';
      urlPreviewEl.style.display = 'none';
      urlPreviewEl.innerHTML = '';
      searchInput.value = '';
      filesStatusEl.textContent = 'Connecting...';

      const result = await ipcRenderer.invoke('list-sftp-files', config);

      if (!result.success) {
        filesStatusEl.textContent = 'Error: ' + result.error;
        return false;
      }

      const filesOnly = result.items.filter(item => item.type === 'file');
      currentFiles = sortFilesNewestFirst(filesOnly);
      filesStatusEl.textContent = 'Connected. Found ' + currentFiles.length + ' file(s).';
      renderFiles(currentFiles, config.remotePath);
      return true;
    }

    async function uploadSelectedFile() {
      if (!currentConfig || !selectedUploadPath) return false;

      uploadBtn.disabled = true;
      chooseFileBtn.disabled = true;
      uploadStatusEl.textContent = `Uploading ${path.basename(selectedUploadPath)}...`;

      const result = await ipcRenderer.invoke('upload-sftp-file', {
        config: currentConfig,
        localFilePath: selectedUploadPath
      });

      chooseFileBtn.disabled = false;

      if (!result.success) {
        uploadStatusEl.textContent = 'Error: ' + result.error;
        uploadBtn.disabled = false;
        return false;
      }

      const assetUrl = createAssetUrl(currentConfig.remotePath, result.fileName);
      clipboard.writeText(assetUrl);
      uploadStatusEl.innerHTML = `<strong>Upload complete.</strong><br>${escapeHtml(result.fileName)} uploaded and URL copied to clipboard.<br>${escapeHtml(assetUrl)}`;
      clearSelectedUpload();
      const refreshed = await fetchFiles(currentConfig);
      setScreen('files');
      filesStatusEl.textContent = refreshed
        ? `Uploaded ${result.fileName}. URL copied to clipboard.`
        : `Uploaded ${result.fileName}, but reloading the file list failed. URL copied to clipboard.`;
      urlPreviewEl.style.display = '';
      urlPreviewEl.innerHTML = `<strong>Copied URL:</strong><br>${escapeHtml(assetUrl)}`;
      return true;
    }

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      statusEl.textContent = 'Saving settings and connecting...';

      const config = getConfigFromForm();
      saveSettings(config);
      currentConfig = config;

      updateConnectionSummary(config);
      setScreen('files');

      const success = await fetchFiles(config);

      if (!success) {
        setScreen('connection');
        statusEl.textContent = 'Error: ' + filesStatusEl.textContent.replace(/^Error:\s*/, '');
      } else {
        statusEl.textContent = 'Settings saved locally. Enter the passphrase again next time.';
        document.getElementById('passphrase').value = '';
      }

      connectBtn.disabled = false;
    });

    refreshBtn.addEventListener('click', async () => {
      if (!currentConfig) return;
      refreshBtn.disabled = true;
      await fetchFiles(currentConfig);
      refreshBtn.disabled = false;
    });

    function goToConnectionScreen() {
      currentConfig = null;
      currentFiles = [];
      clearSelectedUpload();
      document.getElementById('passphrase').value = '';
      statusEl.textContent = 'Saved settings loaded. Enter the passphrase and reconnect.';
      setScreen('connection');
    }

    changeConnectionBtn.addEventListener('click', goToConnectionScreen);
    changeConnectionFromUploadBtn.addEventListener('click', goToConnectionScreen);

    openUploadScreenBtn.addEventListener('click', () => {
      if (!currentConfig) return;
      clearSelectedUpload();
      uploadStatusEl.textContent = 'Choose a file to upload.';
      setScreen('upload');
    });

    backToFilesBtn.addEventListener('click', () => {
      setScreen('files');
    });

    searchInput.addEventListener('input', () => {
      if (!currentConfig) return;
      renderFiles(currentFiles, currentConfig.remotePath);
    });

    chooseFileBtn.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      const [file] = fileInput.files || [];
      if (!file) {
        clearSelectedUpload();
        uploadStatusEl.textContent = 'Choose a file to upload.';
        return;
      }

      const localPath = getLocalPathFromFile(file);

      if (!localPath) {
        clearSelectedUpload();
        uploadStatusEl.textContent = 'Could not access the selected file path.';
        return;
      }

      setSelectedUpload(localPath);
    });

    ['dragenter', 'dragover'].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        event.stopPropagation();
        dropZone.classList.add('drag-over');
      });
    });

    ['dragleave', 'dragend', 'drop'].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        event.stopPropagation();
        dropZone.classList.remove('drag-over');
      });
    });

    dropZone.addEventListener('drop', (event) => {
      const files = Array.from(event.dataTransfer?.files || []);
      const [file] = files;

      if (!file) {
        uploadStatusEl.textContent = 'No file detected in the drop action.';
        return;
      }

      const localPath = getLocalPathFromFile(file);

      if (!localPath) {
        clearSelectedUpload();
        uploadStatusEl.textContent = 'Could not access the dropped file path.';
        return;
      }

      setSelectedUpload(localPath);
    });

    uploadBtn.addEventListener('click', async () => {
      await uploadSelectedFile();
    });

    loadSavedSettings();
    setScreen('connection');
  </script>
</body>
</html>
